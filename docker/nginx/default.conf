# ./nginx/default.conf (已修正)

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    # 1. 配置前端静态文件服务
    location / {
        # 【修正】: root 指向新的前端文件挂载点
        root /var/www/frontend;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 配置上传文件的访问路径
    # 例如，访问 http://localhost:3000/uploads/my-image.jpg
    location /uploads/ {
        # 【修正】: alias 指向新的上传文件挂载点
        alias /var/www/uploads/;
        # 可选：可以为上传的静态资源设置浏览器缓存
        expires 1d;
        add_header Cache-Control "public";
    }

    # 3. API 代理（你的原始配置是正确的，保持不变）
    location /api/ {
        proxy_pass http://backend:8889;
      #  rewrite ^/api/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 延长超时
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

    }

    # 4. 文件访问代理（x-file-storage）
    location /file/ {
        proxy_pass http://backend:8889;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 错误页面配置（可选）
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        # 注意：错误页面文件也应该在前端的构建产物里
        root /var/www/frontend;
    }
}


    


