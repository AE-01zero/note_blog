version: "3.8"

services:
  postgres:
    image: docker.m.daocloud.io/ankane/pgvector:v0.5.1
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../initialization-note-side/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.m.daocloud.io/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      FILE_DOMAIN: ${FILE_DOMAIN}
      STORAGE_PATH: ${STORAGE_PATH}
    ports:
      - "${BACKEND_EXPOSE_PORT:-8889}:8889"
    volumes:
      - ./config/application-docker.yml:/app/config/application-docker.yml:ro
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["java", "-jar", "app.jar", "--spring.config.location=file:/app/config/application-docker.yml"]
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - frontend_build:/static_files

  nginx:
    image: docker.m.daocloud.io/nginx:1.25-alpine
    ports:
      - "${NGINX_EXPOSE_PORT:-3001}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/var/www/frontend:ro
      - upload_data:/var/www/uploads:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  upload_data:
  frontend_build:

